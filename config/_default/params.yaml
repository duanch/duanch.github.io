hugoblox:
  schema: "2.0"
  identity:
    name: Chunhui Duan
    type: person
  theme:
    mode: system
    pack: cupcake
    colors:
      primary: ""
      secondary: ""
      neutral: ""
  typography:
    font: sans
    size: md
    pack: academic
  layout:
    radius: md
    spacing: spacious
    avatar_shape: circle
  header:
    enable: true
    style: navbar
    sticky: true
    align: center
    search: true
    theme_toggle: true
    theme_picker: true
    cta:
      enable: false
  footer:
    style: minimal
    language_switcher: false
  copyright:
    notice: © {year} {name}
    license:
      allow_derivatives: false
      type: custom
      share_alike: false
      allow_commercial: false
  content:
    math:
      enable: true
    toc:
      enable: true
    reading_time:
      enable: false
    citations:
      style: ieee
  search:
    enable: true
  repository:
    enable: false
