bio: "I am Chunhui Duan (段春晖), currently an Associate Professor (tenure-track) in [School of Computer Science and Technology, Beijing Institute of Technology](https://cs.bit.edu.cn/). Previously, I worked as a postdoc research fellow at Tsinghua University. I received the B.S. and Ph.D. degrees from the School of Software at Tsinghua University, in 2013 and 2018 respectively, supervised by [Prof. Yunhao Liu](https://tns.thss.tsinghua.edu.cn/~yunhao/).  <br><br>My research interests include RFID, Internet-of-Things, indoor localization, wireless sensing, etc. "
