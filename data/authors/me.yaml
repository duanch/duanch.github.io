bio: "I am Chunhui Duan (段春晖), currently an Associate Professor (tenure-track) in [School of Computer Science and Technology, Beijing Institute of Technology](https://cs.bit.edu.cn/). Previously, I worked as a postdoc research fellow at Tsinghua University. I received the B.S. and Ph.D. degrees from the School of Software at Tsinghua University, in 2013 and 2018 respectively, supervised by [Prof. Yunhao Liu](https://tns.thss.tsinghua.edu.cn/~yunhao/).  <br><br>My research interests center on intelligent Internet of Things, multimodal sensing and perception, wireless sensing and mobile computing, and wireless security and privacy.   <br><br>I plan to recruit one Ph.D. student and two M.S. students each year, and welcome outstanding undergraduate students to join the lab."
